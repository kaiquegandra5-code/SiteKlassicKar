                      </div>
                      <div className="grid gap-4 sm:grid-cols-2">
                        <div>
                          <label htmlFor="name" className="field-label flex items-center gap-1.5"><Icon name="user" className="h-3.5 w-3.5" /> Nome</label>
                          <input id="name" name="name" type="text" autoComplete="name" placeholder="Seu nome" value={form.name} onChange={handleChange} className="field-input" />
                          {errors.name && <p className="mt-1 text-xs text-red-400">{errors.name}</p>}
                        </div>
                        <div>
                          <label htmlFor="phone" className="field-label flex items-center gap-1.5"><Icon name="phone" className="h-3.5 w-3.5" /> WhatsApp</label>
                          <input id="phone" name="phone" type="tel" inputMode="tel" autoComplete="tel" placeholder="(11) 99378-4778" value={form.phone} onChange={handleChange} className="field-input" />
                          {errors.phone && <p className="mt-1 text-xs text-red-400">{errors.phone}</p>}
                        </div>
                        <div className="sm:col-span-2">
                          <label htmlFor="carModel" className="field-label flex items-center gap-1.5"><Icon name="car" className="h-3.5 w-3.5" /> Modelo do carro</label>
                          <input id="carModel" name="carModel" type="text" placeholder="Ex.: HB20 2022, Onix Plus, Jeep Compass..." value={form.carModel} onChange={handleChange} className="field-input" />
                          {errors.carModel && <p className="mt-1 text-xs text-red-400">{errors.carModel}</p>}
                        </div>
                        <div>
                          <label htmlFor="service" className="field-label flex items-center gap-1.5"><Icon name="package" className="h-3.5 w-3.5" /> Pacote ou serviço</label>
                          <select id="service" name="service" value={form.service} onChange={handleChange} className="field-input">
                            <optgroup label="📦 Pacotes Mensais (assinatura)">
                              {SERVICES.map(s => (
                                <option key={s.id} value={s.id}>{s.emoji} {s.title} — a partir de {s.sizes[0].price}</option>
                              ))}
                            </optgroup>
                            <optgroup label="💧 Serviços">
                              {SINGLE_SERVICES.map(s => (
                                <option key={s.id} value={s.id}>{s.title} — a partir de {s.priceFrom}</option>
                              ))}
                            </optgroup>
                          </select>
                        </div>
                        {isPackage ? (
                          <div>
                            <label htmlFor="size" className="field-label flex items-center gap-1.5"><Icon name="car" className="h-3.5 w-3.5" /> Porte do veículo</label>
                            <select id="size" name="size" value={form.size} onChange={handleChange} className="field-input">
                              <option value="P">P — Pequeno (HB20, Onix, Mobi)</option>
                              <option value="M">M — Médio (Cruze, Corolla, Compass)</option>
                              <option value="G">G — Grande (Hilux, Ranger, SUVs grandes)</option>
                            </select>
                          </div>
                        ) : (
                          <div>
                            <label className="field-label flex items-center gap-1.5"><Icon name="droplets" className="h-3.5 w-3.5" /> Tipo</label>
                            <div className="field-input flex items-center justify-between cursor-not-allowed opacity-80">
                              <span className="text-zinc-400">Pagamento único</span>
                              <span className="badge-lime">Sem fidelidade</span>
                            </div>
                          </div>
                        )}
                        <div className="sm:col-span-2 rounded-xl border border-white/10 p-4 flex items-center justify-between" style={{ background:'linear-gradient(135deg, rgba(185,100,255,0.18) 0%, rgba(132,204,22,0.12) 100%)' }}>
                          <div>
                            <div className="text-xs uppercase tracking-wider text-zinc-400">{isPackage ? 'Valor mensal estimado' : 'Valor do serviço'}</div>
                            <div className="font-display text-2xl font-bold text-gradient">{selectedPrice}</div>
                          </div>
                          <div className="text-right">
                            <div className="text-[11px] text-zinc-400">{isPackage ? `${selectedService?.emoji} ${selectedService?.title}` : selectedService?.title}</div>
                            <div className="text-[11px] text-zinc-400">{isPackage ? `Porte ${form.size}` : 'Serviço avulso'}</div>
                          </div>
                        </div>
                      </div>
                      <button type="submit" disabled={status === 'loading'} className="btn-primary mt-6 w-full text-base py-4 animate-pulse-glow disabled:opacity-70">
                        {status === 'loading' ? (
                          <><Icon name="loader" className="h-5 w-5 animate-spin" /> Enviando…</>
                        ) : (
                          <><Icon name="message-circle" className="h-5 w-5" /> {isPackage ? 'Quero assinar agora' : 'Quero agendar agora'}</>
                        )}
                      </button>
                      <div className="my-5 flex items-center gap-3 text-xs text-zinc-500">
                        <div className="h-px flex-1 bg-white/10"></div>ou, se preferir<div className="h-px flex-1 bg-white/10"></div>
                      </div>
                      <a href={waLink(WA_MSG_PACKAGE)} target="_blank" rel="noreferrer" className="btn-secondary w-full text-sm">
                        <Icon name="message-circle" className="h-4 w-4" /> Falar direto no WhatsApp
                      </a>
                      <p className="mt-4 text-[11px] text-zinc-500 text-center">Ao enviar, você concorda com nossa política de privacidade.</p>
                    </div>
                  )}
                </form>
              </div>
            </div>
          </section>
        );
      };

      const Footer = () => {
        const social = [
          { icon:'instagram', label:'Instagram', href:'https://instagram.com/klassickar.estetica' },
          { icon:'facebook',  label:'Facebook',  href:'https://facebook.com/klassickar'  },
          { icon:'youtube',   label:'YouTube',   href:'https://youtube.com/@klassickar'   },
        ];
        const nav = [
          { title:'Serviços', links:[{ label:'Lavagem Detalhada', href:'#servicos' }, { label:'Correção de Pintura', href:'#servicos' }, { label:'Vitrificação Cerâmica', href:'#servicos' }, { label:'Higienização Interna', href:'#servicos' }]},
          { title:'Empresa',  links:[{ label:'Diferenciais', href:'#diferenciais' }, { label:'Avaliações', href:'#avaliacoes' }, { label:'Agendar', href:'#contato' }, { label:'Sobre nós', href:'#' }]},
          { title:'Suporte',  links:[{ label:'Política de Privacidade', href:'#' }, { label:'Garantia', href:'#' }, { label:'FAQ', href:'#' }, { label:'Trabalhe conosco', href:'#' }]},
        ];
        return (
          <footer className="relative border-t border-white/10 bg-ink-300">
            <div className="absolute inset-x-0 top-0 h-px neon-divider"></div>
            <div className="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8 py-14">
              <div className="grid gap-10 lg:grid-cols-[1.4fr_1fr_1fr_1fr]">
                <div>
                  <Logo />
                  <p className="mt-4 text-sm text-zinc-400 max-w-xs">Estética automotiva premium: detalhamento, vitrificação, lavagem técnica e higienização interna. Excelência em cada detalhe.</p>
                  <div className="mt-5 flex items-center gap-2">
                    {social.map(s => (
                      <a key={s.label} href={s.href} target="_blank" rel="noreferrer" aria-label={s.label} className="grid h-9 w-9 place-items-center rounded-full border border-white/10 bg-white/5 text-zinc-300 transition hover:text-white hover:border-neon-purple/50" style={{}}>
                        <Icon name={s.icon} className="h-4 w-4" />
                      </a>
                    ))}
                  </div>
                </div>
                {nav.map(g => (
                  <div key={g.title}>
                    <h4 className="text-xs font-bold uppercase tracking-[0.2em] text-neon-lime">{g.title}</h4>
                    <ul className="mt-4 space-y-2.5">
                      {g.links.map(l => (
                        <li key={l.label}>
                          <a href={l.href} className="group inline-flex items-center gap-1 text-sm text-zinc-300 hover:text-white transition">
                            {l.label}
                            <Icon name="arrow-up-right" className="h-3.5 w-3.5 opacity-0 -translate-x-1 transition-all group-hover:opacity-100 group-hover:translate-x-0" />
                          </a>
                        </li>
                      ))}
                    </ul>
                  </div>
                ))}
              </div>
              <div className="mt-12 grid gap-4 sm:grid-cols-3">
                {[
                  { icon:'map-pin', t:'Av. Premium, 1234 — São Paulo / SP' },
                  { icon:'phone',   t: WA_DISPLAY },
                  { icon:'mail',    t:'contato@klassickar.com.br' },
                ].map(c => (
                  <div key={c.t} className="glass-card flex items-center gap-3 p-4">
                    <span className="grid h-9 w-9 place-items-center rounded-xl border border-white/10 text-neon-purple" style={{ background:'linear-gradient(135deg, rgba(185,100,255,0.18) 0%, rgba(132,204,22,0.12) 100%)' }}>
                      <Icon name={c.icon} className="h-4 w-4" />
                    </span>
                    <span className="text-sm text-zinc-200">{c.t}</span>
                  </div>
                ))}
              </div>
              <div className="mt-10 flex flex-col sm:flex-row items-center justify-between gap-3 border-t border-white/5 pt-6">
                <p className="text-xs text-zinc-500">© {new Date().getFullYear()} Klassic Kar — Estética Automotiva Premium. Todos os direitos reservados.</p>
                <p className="text-xs text-zinc-500">CNPJ 00.000.000/0001-00 · Desenvolvido com <span className="text-gradient font-semibold">♥</span></p>
              </div>
            </div>
          </footer>
        );
      };

      const FloatingButtons = () => {
        const [showTop, setShowTop] = useState(false);
        useEffect(() => {
          const onScroll = () => setShowTop(window.scrollY > 400);
          onScroll();
          window.addEventListener('scroll', onScroll, { passive: true });
          return () => window.removeEventListener('scroll', onScroll);
        }, []);
        return (
          <div className="fixed right-4 sm:right-6 bottom-4 sm:bottom-6 z-40 flex flex-col items-end gap-3">
            <a href={WA_LINK} target="_blank" rel="noreferrer" aria-label="Falar no WhatsApp" className="group relative inline-flex items-center justify-center h-14 w-14 rounded-full bg-ink-300/95 backdrop-blur border border-white/15 text-neon-lime animate-pulse-glow">
              <span className="absolute -top-1 -right-1 h-3 w-3 rounded-full bg-neon-lime" style={{ boxShadow:'0 0 24px rgba(132,204,22,0.45)' }}></span>
              <Icon name="message-circle" className="h-6 w-6" />
              <span className="absolute right-full mr-3 hidden sm:flex items-center whitespace-nowrap rounded-full bg-ink-300/95 border border-white/10 px-3 py-1.5 text-xs font-semibold text-white opacity-0 translate-x-2 group-hover:opacity-100 group-hover:translate-x-0 transition-all">Falar no WhatsApp</span>
            </a>
            <button type="button" aria-label="Voltar ao topo" onClick={() => window.scrollTo({ top: 0, behavior: 'smooth' })} className={`inline-flex items-center justify-center h-11 w-11 rounded-full bg-white/5 backdrop-blur border border-white/10 text-zinc-200 hover:bg-white/10 hover:text-white transition ${showTop ? 'opacity-100 translate-y-0' : 'pointer-events-none opacity-0 translate-y-2'}`}>
              <Icon name="arrow-up" className="h-4 w-4" />
            </button>
          </div>
        );
      };

      const App = () => (
        <div className="relative min-h-screen overflow-x-hidden">
          <Navbar />
          <main>
            <Hero />
            <Benefits />
            <SingleServices />
            <Services />
            <CTA />
            <Testimonials />
            <ContactForm />
          </main>
          <Footer />
          <FloatingButtons />
        </div>
      );

      const root = ReactDOM.createRoot(document.getElementById('root'));
      const scheduleLucide = () => requestAnimationFrame(() => { try { Lucide.createIcons(); } catch (e) {} });
      root.render(<App />);
      scheduleLucide();
      new MutationObserver(() => scheduleLucide()).observe(document.getElementById('root'), { childList: true, subtree: true });
    </script>
  </body>
</html>
